<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Meta tags para vista previa en WhatsApp -->
    <meta property="og:title" content="Oferta de Trabajo - Pasillo Docente">
    <meta property="og:description" content="Revisá esta oferta de trabajo docente en PBA. Abrí la app para ver detalles y postularte.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://jmbenetti.github.io/img/logopasillo.jpg">
    
    <title>Pasillo Docente - Oferta</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: #e3f2fd; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh; /* Usa todo el alto dinámico del celular */
            padding: 15px;
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            max-width: 380px; 
            width: 100%; 
            text-align: center;
        }
        .logo { 
            width: 65px; 
            height: 65px; 
            border-radius: 14px; 
            margin-bottom: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        h1 { 
            color: #1565C0; 
            margin: 0 0 5px 0; 
            font-size: 20px; 
        }
        p { 
            font-size: 14px; 
            color: #444; 
            line-height: 1.3; 
            margin: 0 0 10px 0; 
        }
        .banner { 
            width: 100%; 
            max-height: 150px; /* Limitamos altura para evitar scroll */
            object-fit: contain;
            border-radius: 8px; 
            margin-bottom: 10px;
            background: #f8f9fa;
        }
        .instruction {
            font-weight: bold;
            color: #1565C0;
            font-size: 13px;
            margin-bottom: 2px;
        }
        .play-store-img {
            height: 55px;
            transition: transform 0.2s;
        }
        .play-store-img:active {
            transform: scale(0.95);
        }
        .footer { 
            margin-top: 12px; 
            font-size: 11px; 
            color: #777; 
            line-height: 1.2;
        }
        b { color: #1565C0; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://jmbenetti.github.io/img/logopasillo.jpg" alt="Logo" class="logo">
        <h1>Pasillo Docente</h1>
        <p>Te compartieron una oferta específica.<br>Para ver detalles y postularte, <b>necesitás</b> la app.</p>
        
        <img src="https://jmbenetti.github.io/img/funciones.png" alt="Funciones" class="banner">
        
        <p class="instruction">Hacé clic para descargar:</p>
        <a href="https://play.google.com/store/apps/details?id=com.jmbenetti.pasillodocente">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/es_badge_web_generic.png" alt="Google Play" class="play-store-img">
        </a>
        
        <div class="footer">
            Si ya tenés la app y ves esto,<br>
            aseguráte de abrir el link con <b>Pasillo Docente</b>.
        </div>
    </div>
</body>
</html>
